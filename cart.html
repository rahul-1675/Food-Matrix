<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart – Food Munch</title>
  <meta name="description" content="Review your Food Munch cart, adjust quantities, and proceed to place your order." />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: #f9fbfe;
      min-height: 100vh;
    }

    /* ── NAV ── */
    .navbar { background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 12px 24px; }
    .food-munch-logo { width: 70px; height: 61px; }
    .cart-nav-icon { position: relative; cursor: pointer; }
    .cart-badge {
      position: absolute; top: -6px; right: -8px;
      background: #d0b200; color: #fff;
      font-size: 11px; font-weight: 700;
      width: 20px; height: 20px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      background: linear-gradient(135deg, #1a1100 0%, #3a2e00 100%);
      padding: 60px 0 40px;
      text-align: center;
    }
    .page-header h1 { color: #d0b200; font-size: 36px; font-weight: 700; letter-spacing: -0.5px; }
    .page-header p  { color: rgba(255,255,255,.7); font-size: 15px; margin-top: 6px; }

    /* ── CART LAYOUT ── */
    .cart-wrapper { max-width: 900px; margin: 40px auto; padding: 0 16px 60px; }

    /* ── CART ITEM CARD ── */
    .cart-item {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      margin-bottom: 16px;
      transition: box-shadow .2s;
    }
    .cart-item:hover { box-shadow: 0 6px 28px rgba(0,0,0,.13); }
    .cart-item-img {
      width: 90px; height: 80px;
      object-fit: cover; border-radius: 12px;
      flex-shrink: 0;
    }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 17px; font-weight: 600; color: #1a1100; }
    .cart-item-price { font-size: 14px; color: #7b8794; margin-top: 2px; }
    .cart-item-subtotal { font-size: 16px; font-weight: 600; color: #d0b200; margin-top: 4px; }

    /* qty controls */
    .qty-controls { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .qty-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1.5px solid #d0b200; background: transparent;
      color: #d0b200; font-size: 18px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .2s, color .2s;
      line-height: 1;
    }
    .qty-btn:hover { background: #d0b200; color: #fff; }
    .qty-value { font-size: 16px; font-weight: 600; color: #1a1100; min-width: 20px; text-align: center; }

    /* remove */
    .remove-btn {
      background: none; border: none; cursor: pointer;
      color: #c0392b; font-size: 18px; padding: 4px 8px;
      border-radius: 8px; transition: background .2s;
      flex-shrink: 0;
    }
    .remove-btn:hover { background: #fdecea; }

    /* ── SUMMARY CARD ── */
    .summary-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.09);
      padding: 28px 32px;
      margin-top: 24px;
    }
    .summary-title { font-size: 20px; font-weight: 700; color: #1a1100; margin-bottom: 20px; }
    .summary-row {
      display: flex; justify-content: space-between;
      font-size: 15px; color: #5a7184; margin-bottom: 12px;
    }
    .summary-row.total { font-size: 18px; font-weight: 700; color: #1a1100; border-top: 1.5px dashed #e5eaf4; padding-top: 16px; margin-top: 4px; }
    .summary-row.total span:last-child { color: #d0b200; }

    .checkout-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #d0b200, #f5d020);
      color: #1a1100; font-size: 17px; font-weight: 700;
      border: none; border-radius: 14px; cursor: pointer;
      margin-top: 22px;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(208,178,0,.35);
    }
    .checkout-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(208,178,0,.5); }

    .continue-btn {
      width: 100%; padding: 14px;
      background: transparent; color: #5a7184;
      font-size: 15px; font-weight: 500;
      border: 1.5px solid #e5eaf4; border-radius: 14px; cursor: pointer;
      margin-top: 12px; transition: border-color .2s, color .2s;
    }
    .continue-btn:hover { border-color: #d0b200; color: #d0b200; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }
    .empty-state svg { opacity: .25; }
    .empty-state h2 { font-size: 24px; font-weight: 600; color: #323f4b; margin-top: 24px; }
    .empty-state p  { color: #7b8794; margin-top: 8px; }
    .empty-state a button {
      margin-top: 24px;
      background: linear-gradient(135deg, #d0b200, #f5d020);
      color: #1a1100; font-size: 16px; font-weight: 700;
      border: none; border-radius: 12px; padding: 14px 36px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(208,178,0,.35);
      transition: transform .2s;
    }
    .empty-state a button:hover { transform: translateY(-2px); }

    /* ── PROMO BOX ── */
    .promo-box {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .promo-input {
      flex: 1; border: 1.5px solid #e5eaf4; border-radius: 12px;
      padding: 10px 16px; font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    .promo-input:focus { border-color: #d0b200; }
    .promo-btn {
      background: #d0b200; color: #1a1100; font-weight: 700;
      border: none; border-radius: 12px; padding: 10px 20px;
      cursor: pointer; font-size: 14px; white-space: nowrap;
      transition: background .2s;
    }
    .promo-btn:hover { background: #b89e00; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #d0b200; border-radius: 3px; }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav class="navbar d-flex align-items-center justify-content-between">
    <a href="mainpage.html">
      <img src="https://assets.ccbp.in/frontend/responsive-website/food-munch-img.png" class="food-munch-logo" alt="Food Munch" />
    </a>
    <div class="d-flex align-items-center gap-3" style="gap:20px;">
      <a href="mainpage.html" style="color:#5a7184;text-decoration:none;font-size:15px;font-weight:500;">← Back to Menu</a>
      <div class="cart-nav-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="#d0b200" class="bi bi-cart3" viewBox="0 0 16 16">
          <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l.84 4.479 9.144-.459L13.89 4zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2" />
        </svg>
        <span class="cart-badge" id="nav-cart-count" style="display:none;">0</span>
      </div>
    </div>
  </nav>

  <!-- HEADER -->
  <div class="page-header">
    <h1>🛒 Your Cart</h1>
    <p id="cart-header-subtitle">Loading your items…</p>
  </div>

  <!-- MAIN -->
  <div class="cart-wrapper">
    <div id="cart-content"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" crossorigin="anonymous"></script>
  <script>
    const CART_KEY = 'food_munch_cart';
    function getCart() { try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; } catch(e) { return []; } }
    function saveCart(c) { localStorage.setItem(CART_KEY, JSON.stringify(c)); }

    function updateNavBadge() {
      const count = getCart().reduce((s,i)=>s+i.qty,0);
      const el = document.getElementById('nav-cart-count');
      el.textContent = count;
      el.style.display = count > 0 ? 'inline-flex' : 'none';
    }

    function renderCart() {
      const cart = getCart();
      updateNavBadge();
      const container = document.getElementById('cart-content');
      const subtitle  = document.getElementById('cart-header-subtitle');

      if (cart.length === 0) {
        subtitle.textContent = 'Your cart is empty';
        container.innerHTML = `
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" fill="#d0b200" viewBox="0 0 16 16">
              <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l.84 4.479 9.144-.459L13.89 4zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
            </svg>
            <h2>Nothing here yet!</h2>
            <p>Browse our menu and add items to your cart.</p>
            <a href="mainpage.html"><button>Explore Menu</button></a>
          </div>`;
        return;
      }

      const totalItems = cart.reduce((s,i)=>s+i.qty, 0);
      subtitle.textContent = `${totalItems} item${totalItems>1?'s':''} in your cart`;

      const subtotal = cart.reduce((s,i)=>s+i.price*i.qty, 0);
      const delivery = subtotal > 499 ? 0 : 40;
      const total    = subtotal + delivery;

      let itemsHTML = '';
      cart.forEach(item => {
        itemsHTML += `
          <div class="cart-item" data-name="${escHtml(item.name)}">
            <img class="cart-item-img"
                 src="${escHtml(item.img || 'https://assets.ccbp.in/frontend/responsive-website/food-serve.png')}"
                 alt="${escHtml(item.name)}"
                 onerror="this.src='https://assets.ccbp.in/frontend/responsive-website/food-serve.png'" />
            <div class="cart-item-info">
              <div class="cart-item-name">${escHtml(item.name)}</div>
              <div class="cart-item-price">₹${item.price} per item</div>
              <div class="qty-controls">
                <button class="qty-btn" onclick="changeQty('${escHtml(item.name)}', -1)">−</button>
                <span class="qty-value">${item.qty}</span>
                <button class="qty-btn" onclick="changeQty('${escHtml(item.name)}', 1)">+</button>
              </div>
            </div>
            <div>
              <div class="cart-item-subtotal">₹${item.price * item.qty}</div>
              <button class="remove-btn" onclick="removeItem('${escHtml(item.name)}')" title="Remove item">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                  <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                </svg>
              </button>
            </div>
          </div>`;
      });

      container.innerHTML = `
        ${itemsHTML}
        <div class="summary-card">
          <div class="summary-title">Order Summary</div>
          <div class="promo-box">
            <input type="text" class="promo-input" id="promo-code" placeholder="Enter promo code…" />
            <button class="promo-btn" onclick="applyPromo()">Apply</button>
          </div>
          <div class="summary-row"><span>Subtotal (${totalItems} items)</span><span>₹${subtotal}</span></div>
          <div class="summary-row"><span>Delivery fee</span><span>${delivery === 0 ? '<span style="color:#0b6623;font-weight:600;">FREE</span>' : '₹'+delivery}</span></div>
          ${delivery > 0 ? `<div style="font-size:12px;color:#7b8794;margin-bottom:12px;">Add ₹${500-subtotal} more for free delivery!</div>` : ''}
          <div class="summary-row total"><span>Total</span><span>₹${total}</span></div>
          <button class="checkout-btn" onclick="goToOrder()">Proceed to Order →</button>
          <button class="continue-btn" onclick="window.location='mainpage.html'">Continue Shopping</button>
        </div>`;
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function changeQty(name, delta) {
      const cart = getCart();
      const item = cart.find(i => i.name === name);
      if (!item) return;
      item.qty = Math.max(1, item.qty + delta);
      saveCart(cart);
      renderCart();
    }

    function removeItem(name) {
      const cart = getCart().filter(i => i.name !== name);
      saveCart(cart);
      renderCart();
    }

    function applyPromo() {
      const code = document.getElementById('promo-code').value.trim().toUpperCase();
      const valid = { 'FOOD10': 10, 'MUNCH20': 20 };
      if (valid[code]) {
        alert(`Promo "${code}" applied! ${valid[code]}% discount will be applied at checkout.`);
        localStorage.setItem('fm_promo', JSON.stringify({ code, discount: valid[code] }));
      } else {
        alert('Invalid promo code. Try FOOD10 or MUNCH20!');
      }
    }

    function goToOrder() {
      if (getCart().length === 0) { alert('Your cart is empty!'); return; }
      window.location = 'order.html';
    }

    renderCart();
  </script>
</body>
</html>
